# Hooks exécutés avant chaque commit. Installation : `uvx pre-commit install`.
# Exécution manuelle sur tout le dépôt : `uvx pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # garde-fou anti-commit de CSV/jeux de données

  # Lint + format Python (ruff).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Détection de secrets dans les modifications indexées.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
