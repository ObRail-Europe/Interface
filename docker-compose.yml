# Orchestration ObRail : base de données + migrations + API + dashboard.
#   Lancement (schéma créé automatiquement) :  docker compose up --build
#   Chargement des données (CSV de data/)    :  docker compose --profile load run --rm load

x-db-url: &db-url postgresql+psycopg://${POSTGRES_USER:-obrail}:${POSTGRES_PASSWORD:-obrail}@db:5432/${POSTGRES_DB:-obrail}

services:
  db:
    image: postgres:16
    command: ["postgres", "-c", "max_wal_size=8GB", "-c", "work_mem=4GB", "-c", "shared_buffers=4GB"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-obrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-obrail}
      POSTGRES_DB: ${POSTGRES_DB:-obrail}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # persistance des données
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obrail} -d ${POSTGRES_DB:-obrail}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 16G

  # Provisionne le schéma (tables, index, vues) via Alembic puis se termine.
  # Image auto-portante : embarque aussi les CSV (utilisés par le service load).
  migrate:
    image: ghcr.io/obrail-europe/obrail-database:0.1.0
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: *db-url
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # Ingestion des CSV embarqués dans l'image (idempotente : saute si la base n'est pas vide).
  load:
    image: ghcr.io/obrail-europe/obrail-database:0.1.0
    command: ["python", "-m", "obrail_database.etl.run", "--data-dir", "/app/data"]
    environment:
      DATABASE_URL: *db-url
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    image: ghcr.io/obrail-europe/obrail-api:0.1.0
    environment:
      DATABASE_URL: *db-url
      MODEL_DIR: /data # modèles .joblib
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro # lecture seule
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      load:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: ghcr.io/obrail-europe/obrail-dashboard:0.1.0
    environment:
      API_URL: http://api:8000
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3000} # panneaux Grafana embarqués
    ports:
      - "8050:8050"
    depends_on:
      - api


  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  # Réingestion forcée des CSV embarqués (écrase les données existantes).
  #   docker compose --profile load run --rm force-load
  force-load:
    image: ghcr.io/obrail-europe/obrail-database:0.1.0
    profiles: ["load"]
    command: ["python", "-m", "obrail_database.etl.run", "--data-dir", "/app/data", "--force"]
    environment:
      DATABASE_URL: *db-url
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  pgdata:
  loki-data:
  grafana-data:
