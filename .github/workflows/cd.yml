name: CD

on:
  push:
    branches: ["main"]
    tags:
      - 'v*.*.*'
      - '*.*.*'

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push image - ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: database
            context: .
            dockerfile: ./database/Dockerfile
          - service: api
            context: .
            dockerfile: ./api/Dockerfile
          - service: dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up BuildX
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract Docker metadata & name image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/obrail-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Image Docker pour le service ${{ matrix.service }} d'ObRail
            
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Clean up old sha-* images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'obrail-${{ matrix.service }}'
          package-type: 'container'
          ignore-versions: '^(latest|v?\d+\.\d+\.\d+)$'
          min-versions-to-keep: 1