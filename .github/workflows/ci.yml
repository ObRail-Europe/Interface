name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Annule les exécutions précédentes d'une même branche/PR encore en cours.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff) - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [database, api, dashboard]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run ruff format --check

  test-database:
    name: Tests Database (+ PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: obrail
          POSTGRES_PASSWORD: obrail
          POSTGRES_DB: obrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://obrail:obrail@localhost:5432/obrail
    defaults:
      run:
        working-directory: database
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -q

  test-api:
    name: Tests API (+ PostgreSQL)
    runs-on: ubuntu-latest
    # Service Postgres pour les tests d'intégration backend / base de données.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: obrail
          POSTGRES_PASSWORD: obrail
          POSTGRES_DB: obrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://obrail:obrail@localhost:5432/obrail
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      # Résout la dépendance path obrail-database (../database présent au checkout).
      - run: uv sync --frozen
      - run: uv run pytest -q

  test-dashboard:
    name: Tests Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -q

  build:
    name: Build image Docker - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test-database, test-api, test-dashboard]
    strategy:
      fail-fast: false
      matrix:
        # L'api se build depuis la racine (dépendance path vers database).
        include:
          - service: api
            context: .
            dockerfile: ./api/Dockerfile
          - service: dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: obrail-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
