name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Annule les exécutions précédentes d'une même branche/PR encore en cours.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff) - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [database, api, dashboard]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ruff format
        run: uv run ruff format --check

  test-database:
    name: Tests Database (+ PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: obrail
          POSTGRES_PASSWORD: obrail
          POSTGRES_DB: obrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://obrail:obrail@localhost:5432/obrail
    defaults:
      run:
        working-directory: database
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -q

  test-api:
    name: Tests API (+ PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: obrail
          POSTGRES_PASSWORD: obrail
          POSTGRES_DB: obrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://obrail:obrail@localhost:5432/obrail
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -q

  test-dashboard:
    name: Tests Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -q

  build-test:
    name: Test Build Docker - ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, test-database, test-api, test-dashboard]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: database
            context: .
            dockerfile: ./database/Dockerfile
          - service: api
            context: .
            dockerfile: ./api/Dockerfile
          - service: dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (Dry Run)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64
          tags: obrail-${{ matrix.service }}:pr-test
          cache-from: type=gha
